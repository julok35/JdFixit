<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 280" role="img" aria-label="Croquis technique d'une graveuse laser">
  <defs>
    <pattern id="g" width="26" height="26" patternUnits="userSpaceOnUse">
      <path d="M26 0H0V26" fill="none" stroke="#1b1c1e" stroke-opacity=".06"/>
    </pattern>
    <pattern id="h" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line y2="6" stroke="#1b1c1e" stroke-opacity=".18"/>
    </pattern>
  </defs>
  <rect width="420" height="280" fill="#fcfcfb"/>
  <rect width="420" height="280" fill="url(#g)"/>
  <g fill="none" stroke="#1b1c1e" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" transform="rotate(-.6 210 140)">
    <!-- cadre portique vu de dessus -->
    <rect x="80" y="52" width="260" height="176"/>
    <rect x="88" y="60" width="244" height="160" stroke-width="1.4" stroke-dasharray="5 6"/>
    <!-- traverse mobile -->
    <rect x="96" y="108" width="228" height="18" fill="url(#h)"/>
    <!-- tête laser -->
    <rect x="196" y="102" width="30" height="30" fill="#e2562b" stroke="#e2562b"/>
    <!-- faisceau -->
    <path d="M211 132v34" stroke="#e2562b"/>
    <path d="M203 166h16l-8 10z" fill="#e2562b" stroke="#e2562b"/>
    <!-- planche gravée -->
    <rect x="140" y="182" width="142" height="34" stroke-width="1.8"/>
    <path d="M152 199h36M196 199h22M226 199h44" stroke-width="1.6"/>
    <!-- ligne de cote -->
    <path d="M80 246h260M80 240v12M340 240v12" stroke-width="1.4"/>
  </g>
  <text x="82" y="272" font-family="'Space Mono',monospace" font-size="11" fill="#5b6066">GRAVURE &#183; D&#201;COUPE FINE</text>
</svg>
